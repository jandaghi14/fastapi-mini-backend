name: Run Tests

on:
  push:
  workflow_dispatch:  
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
           - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        env:
          DATABASE_URL_TEST: ${{ secrets.DATABASE_URL_TEST }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL_TEST: ${{ secrets.DATABASE_URL_TEST }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: pytest
        
